<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life in Weeks</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f5f0;
      color: #333;
      font-family: monospace;
      padding: 24px;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: normal;
      color: #aaa;
      margin-bottom: 16px;
      letter-spacing: 0.05em;
    }

    form {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 28px;
    }

    form label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.75rem;
      color: #999;
    }

    form input {
      background: #fff;
      border: 1px solid #ddd;
      color: #333;
      padding: 5px 8px;
      font-family: monospace;
      font-size: 0.85rem;
      border-radius: 3px;
      width: 160px;
    }


    #grid {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .year-row {
      display: flex;
      align-items: center;
      gap: 1px;
    }

    .year-label {
      font-size: 0.65rem;
      color: transparent;
      width: 36px;
      flex-shrink: 0;
      text-align: right;
      padding-right: 6px;
      transition: color 0.15s;
    }

    #grid-wrap:hover .year-label { color: #aaa; }

    :root {
      --o-size: 14px;
      --x-size: 16px;
      --x-offset: -0.1em; /* positive = down, negative = up */
    }

    .week {
      font-family: 'Courier New', Courier, monospace;
      font-size: var(--o-size);
      font-weight: 600;
      line-height: 1;
      position: relative;
      display: inline-block;
      color: #898989;
      flex-shrink: 0;
      text-align: center;
    }

    .week.past::after {
      content: 'x';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: var(--x-offset);
      font-size: var(--x-size);
      font-weight: normal;
      color: #c00;
      font-family: 'Courier New', Courier, monospace;
      pointer-events: none;
    }

    .week.pre-birth { color: transparent; }
    .week.post-end  { color: #e0e0da; }

    #stats {
      margin-top: 20px;
      font-size: 0.72rem;
      color: transparent;
      line-height: 1.8;
      transition: color 0.15s;
    }

    #grid-wrap:hover #stats { color: #aaa; }

    #lookup-section {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 10px;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #e0e0da;
      margin-bottom: 16px;
    }

    #lookup-section label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.75rem;
      color: #999;
    }

    #inp-country {
      background: #fff;
      border: 1px solid #ddd;
      color: #333;
      padding: 5px 8px;
      font-family: monospace;
      font-size: 0.85rem;
      border-radius: 3px;
      width: 220px;
    }

    #btn-lookup {
      background: #fff;
      color: #999;
      border: 1px solid #ddd;
      padding: 6px 14px;
      font-family: monospace;
      font-size: 0.85rem;
      border-radius: 3px;
      cursor: pointer;
    }

    #btn-lookup:hover:not(:disabled) { border-color: #bbb; color: #333; }
    #btn-lookup:disabled { opacity: 0.4; cursor: default; }

    #lookup-result {
      font-size: 0.75rem;
      color: #999;
      align-self: center;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #btn-apply {
      background: none;
      border: none;
      color: #2a7ae2;
      font-family: monospace;
      font-size: 0.75rem;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
    }

    #btn-apply:hover { color: #1f62b8; }
  </style>
</head>
<body>
  <h1>life in weeks</h1>

  <div id="grid-wrap">
    <div id="grid"></div>
    <div id="stats"></div>
  </div>

  <div id="lookup-section">
    <label>
      country life expectancy
      <input id="inp-country" list="country-list" type="text" placeholder="type a country…" autocomplete="off" />
      <datalist id="country-list"></datalist>
    </label>
    <button id="btn-lookup" type="button">lookup</button>
    <span id="lookup-result"></span>
  </div>

  <form id="params-form" style="border-top:none; padding-top:0;">
    <label>
      birthday
      <input type="date" id="inp-birthday" />
    </label>
    <label>
      life expectation (years)
      <input type="number" id="inp-life" min="1" max="150" step="any" />
    </label>
  </form>

  <script>
    // ── helpers ────────────────────────────────────────────────────────────

    // Return a plain UTC midnight Date from "YYYY-MM-DD"
    function parseDate(str) {
      const [y, m, d] = str.split('-').map(Number);
      return new Date(Date.UTC(y, m - 1, d));
    }

    // Format a Date as "YYYY-MM-DD"
    function fmtDate(d) {
      return d.toISOString().slice(0, 10);
    }

    // Add fractional years to a Date (uses 365.2425 days/year)
    function addYears(date, years) {
      return new Date(date.getTime() + years * 365.2425 * 86400000);
    }

    // Monday of ISO week 1 for a given year
    function isoWeek1Monday(year) {
      // ISO week 1 contains the first Thursday of January
      const jan4 = new Date(Date.UTC(year, 0, 4)); // Jan 4 is always in week 1
      const dow = jan4.getUTCDay() || 7;           // 1=Mon … 7=Sun
      return new Date(jan4.getTime() - (dow - 1) * 86400000);
    }

    // Number of ISO weeks in a year
    function isoWeeksInYear(year) {
      const w1 = isoWeek1Monday(year);
      const w1next = isoWeek1Monday(year + 1);
      return Math.round((w1next - w1) / (7 * 86400000));
    }

    // Monday of week w (1-based) in year
    function weekMonday(year, w) {
      return new Date(isoWeek1Monday(year).getTime() + (w - 1) * 7 * 86400000);
    }

    // ── render ─────────────────────────────────────────────────────────────

    function render(birthdayStr, lifeExpectation) {
      const birthday = parseDate(birthdayStr);
      const endDate  = addYears(birthday, lifeExpectation);
      const today    = new Date(Date.UTC(
        new Date().getUTCFullYear(),
        new Date().getUTCMonth(),
        new Date().getUTCDate()
      ));

      const birthYear = birthday.getUTCFullYear();
      const endYear   = endDate.getUTCFullYear();

      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      let totalWeeks = 0;
      let pastWeeks  = 0;

      for (let year = birthYear; year <= endYear; year++) {
        const numWeeks = isoWeeksInYear(year);
        const row = document.createElement('div');
        row.className = 'year-row';

        const label = document.createElement('span');
        label.className = 'year-label';
        label.textContent = year;
        row.appendChild(label);

        for (let w = 1; w <= numWeeks; w++) {
          const monday = weekMonday(year, w);
          const sunday = new Date(monday.getTime() + 6 * 86400000);

          const circle = document.createElement('span');
          circle.className = 'week';
          circle.textContent = 'O';

          // Tooltip
          circle.title = `${fmtDate(monday)} – ${fmtDate(sunday)}`;

          if (sunday < birthday) {
            circle.classList.add('pre-birth');
          } else if (monday > endDate) {
            circle.classList.add('post-end');
          } else {
            totalWeeks++;
            if (sunday < today) {
              circle.classList.add('past');
              pastWeeks++;
            }
          }

          row.appendChild(circle);
        }

        grid.appendChild(row);
      }

      // Stats
      const pct = totalWeeks ? ((pastWeeks / totalWeeks) * 100).toFixed(1) : 0;
      document.getElementById('stats').innerHTML =
        `${pastWeeks} weeks lived &nbsp;/&nbsp; ${totalWeeks} total &nbsp;·&nbsp; ${pct}% elapsed`;
    }

    // ── country lookup ─────────────────────────────────────────────────────

    // ISO2 code → country name  (World Bank accepts ISO2)
    const COUNTRIES = {
      AF:'Afghanistan',DZ:'Algeria',AO:'Angola',AR:'Argentina',AM:'Armenia',
      AU:'Australia',AT:'Austria',AZ:'Azerbaijan',BD:'Bangladesh',BY:'Belarus',
      BE:'Belgium',BJ:'Benin',BO:'Bolivia',BA:'Bosnia and Herzegovina',
      BW:'Botswana',BR:'Brazil',BG:'Bulgaria',BF:'Burkina Faso',BI:'Burundi',
      KH:'Cambodia',CM:'Cameroon',CA:'Canada',CF:'Central African Republic',
      TD:'Chad',CL:'Chile',CN:'China',CO:'Colombia',CG:'Congo',CR:'Costa Rica',
      HR:'Croatia',CU:'Cuba',CY:'Cyprus',CZ:'Czech Republic',DK:'Denmark',
      DO:'Dominican Republic',CD:'DR Congo',EC:'Ecuador',EG:'Egypt',
      SV:'El Salvador',ER:'Eritrea',EE:'Estonia',ET:'Ethiopia',FI:'Finland',
      FR:'France',GA:'Gabon',GE:'Georgia',DE:'Germany',GH:'Ghana',GR:'Greece',
      GT:'Guatemala',GN:'Guinea',HT:'Haiti',HN:'Honduras',HU:'Hungary',
      IN:'India',ID:'Indonesia',IR:'Iran',IQ:'Iraq',IE:'Ireland',IL:'Israel',
      IT:'Italy',JM:'Jamaica',JP:'Japan',JO:'Jordan',KZ:'Kazakhstan',KE:'Kenya',
      KP:'North Korea',KR:'South Korea',XK:'Kosovo',KW:'Kuwait',KG:'Kyrgyzstan',
      LA:'Laos',LV:'Latvia',LB:'Lebanon',LS:'Lesotho',LR:'Liberia',LY:'Libya',
      LT:'Lithuania',LU:'Luxembourg',MG:'Madagascar',MW:'Malawi',MY:'Malaysia',
      ML:'Mali',MR:'Mauritania',MX:'Mexico',MD:'Moldova',MN:'Mongolia',
      MA:'Morocco',MZ:'Mozambique',MM:'Myanmar',NA:'Namibia',NP:'Nepal',
      NL:'Netherlands',NZ:'New Zealand',NI:'Nicaragua',NE:'Niger',NG:'Nigeria',
      MK:'North Macedonia',NO:'Norway',OM:'Oman',PK:'Pakistan',PA:'Panama',
      PY:'Paraguay',PE:'Peru',PH:'Philippines',PL:'Poland',PT:'Portugal',
      QA:'Qatar',RO:'Romania',RU:'Russia',RW:'Rwanda',SA:'Saudi Arabia',
      SN:'Senegal',RS:'Serbia',SL:'Sierra Leone',SK:'Slovakia',SI:'Slovenia',
      SO:'Somalia',ZA:'South Africa',SS:'South Sudan',ES:'Spain',LK:'Sri Lanka',
      SD:'Sudan',SE:'Sweden',CH:'Switzerland',SY:'Syria',TW:'Taiwan',
      TJ:'Tajikistan',TZ:'Tanzania',TH:'Thailand',TL:'Timor-Leste',TG:'Togo',
      TN:'Tunisia',TR:'Turkey',TM:'Turkmenistan',UG:'Uganda',UA:'Ukraine',
      AE:'United Arab Emirates',GB:'United Kingdom',US:'United States',
      UY:'Uruguay',UZ:'Uzbekistan',VE:'Venezuela',VN:'Vietnam',YE:'Yemen',
      ZM:'Zambia',ZW:'Zimbabwe'
    };

    // Populate datalist
    (function() {
      const dl = document.getElementById('country-list');
      Object.entries(COUNTRIES)
        .sort((a, b) => a[1].localeCompare(b[1]))
        .forEach(([code, name]) => {
          const opt = document.createElement('option');
          opt.value = name;
          opt.dataset.code = code;
          dl.appendChild(opt);
        });
    })();

    // Reverse map: name → ISO2
    function nameToCode(name) {
      const lower = name.trim().toLowerCase();
      return Object.entries(COUNTRIES).find(([, n]) => n.toLowerCase() === lower)?.[0];
    }

    async function fetchIndicator(code, indicator) {
      const url = `https://api.worldbank.org/v2/country/${code}/indicator/${indicator}?format=json&mrv=5`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      const entries = (json[1] || []).filter(e => e.value != null);
      if (!entries.length) throw new Error('no data');
      return entries[0];
    }

    function applyValue(val, gender) {
      document.getElementById('inp-life').value = val;
      ls.set('lifeExpectation', val);
      ls.set('gender', gender);
      onParamChange();
    }

    document.getElementById('btn-lookup').addEventListener('click', async () => {
      const btn = document.getElementById('btn-lookup');
      const resultEl = document.getElementById('lookup-result');
      const name = document.getElementById('inp-country').value.trim();
      const code = nameToCode(name);

      if (!code) { resultEl.textContent = 'country not found'; return; }

      btn.disabled = true;
      resultEl.textContent = 'fetching…';

      try {
        const [total, male, female] = await Promise.all([
          fetchIndicator(code, 'SP.DYN.LE00.IN'),
          fetchIndicator(code, 'SP.DYN.LE00.MA.IN'),
          fetchIndicator(code, 'SP.DYN.LE00.FE.IN'),
        ]);

        const fmt = v => parseFloat(parseFloat(v).toFixed(1));
        const [t, m, f] = [fmt(total.value), fmt(male.value), fmt(female.value)];
        const year = total.date;
        const country = total.country.value;

        resultEl.innerHTML =
          `<span style="color:#888">${country} (${year})</span> &nbsp;` +
          `<span style="font-size:1.3em">&#9898;</span> <strong style="color:#ccc">${t}</strong> <button class="apply-btn" data-val="${t}" data-gender="avg">apply</button> &nbsp;` +
          `<span style="font-size:1.3em">&#9794;</span> <strong style="color:#ccc">${m}</strong> <button class="apply-btn" data-val="${m}" data-gender="male">apply</button> &nbsp;` +
          `<span style="font-size:1.3em">&#9792;</span> <strong style="color:#ccc">${f}</strong> <button class="apply-btn" data-val="${f}" data-gender="female">apply</button>`;

        ls.set('country', name);

        resultEl.querySelectorAll('.apply-btn').forEach(b =>
          b.addEventListener('click', () => applyValue(b.dataset.val, b.dataset.gender))
        );
      } catch (err) {
        resultEl.textContent = `error: ${err.message}`;
      } finally {
        btn.disabled = false;
      }
    });

    // Allow pressing Enter in country input
    document.getElementById('inp-country').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('btn-lookup').click();
    });

    // ── persistence ────────────────────────────────────────────────────────

    const ls = {
      get: (k, def) => { const v = localStorage.getItem('lifeweeks.' + k); return v !== null ? v : def; },
      set: (k, v)   => localStorage.setItem('lifeweeks.' + k, v),
    };

    // ── URL params & form ──────────────────────────────────────────────────

    const DEFAULT_BIRTHDAY = '1990-01-01';
    const DEFAULT_LIFE     = 80;

    function getParams() {
      const p = new URLSearchParams(location.search);
      return {
        birthday:        p.get('birthday')        || ls.get('birthday',        DEFAULT_BIRTHDAY),
        lifeExpectation: parseFloat(p.get('life_expectation') || ls.get('lifeExpectation', DEFAULT_LIFE)),
      };
    }

    function setFormValues(birthday, lifeExpectation) {
      document.getElementById('inp-birthday').value = birthday;
      document.getElementById('inp-life').value     = lifeExpectation;
    }

    function onParamChange() {
      const birthday = document.getElementById('inp-birthday').value;
      const life     = document.getElementById('inp-life').value;
      if (!birthday || !life) return;
      ls.set('birthday', birthday);
      ls.set('lifeExpectation', life);
      const url = new URL(location.href);
      url.searchParams.set('birthday', birthday);
      url.searchParams.set('life_expectation', life);
      history.replaceState({}, '', url);
      render(birthday, parseFloat(life));
    }

    document.getElementById('inp-birthday').addEventListener('change', onParamChange);
    document.getElementById('inp-life').addEventListener('input', onParamChange);

    // ── auto-refresh at UTC midnight ───────────────────────────────────────

    function scheduleRefresh() {
      const now  = Date.now();
      const next = new Date(now);
      next.setUTCHours(24, 0, 0, 0); // next UTC midnight
      setTimeout(() => {
        const { birthday, lifeExpectation } = getParams();
        render(birthday, lifeExpectation);
        setInterval(() => {
          const { birthday, lifeExpectation } = getParams();
          render(birthday, lifeExpectation);
        }, 86400000); // every 24 h after that
      }, next - now);
    }

    // ── init ───────────────────────────────────────────────────────────────

    const { birthday, lifeExpectation } = getParams();
    setFormValues(birthday, lifeExpectation);
    // restore country input
    const savedCountry = ls.get('country', '');
    if (savedCountry) document.getElementById('inp-country').value = savedCountry;
    render(birthday, lifeExpectation);
    scheduleRefresh();
  </script>
</body>
</html>
